name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build — shared
        run: pnpm --filter @bistro/shared build

      - name: Typecheck — shared
        run: pnpm --filter @bistro/shared typecheck

      - name: Typecheck — API
        run: pnpm --filter @bistro/api typecheck

      - name: Typecheck — mobile
        run: pnpm --filter @bistro/mobile typecheck

      - name: Test — API
        run: pnpm --filter @bistro/api test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: groq
