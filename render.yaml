services:
  - type: web
    name: bistro-api
    runtime: node
    rootDir: .
    buildCommand: npm install -g pnpm@latest && pnpm install --frozen-lockfile && pnpm --filter @bistro/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
